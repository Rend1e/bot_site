<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scable=no, initial-scale=1.0, maximum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="stylesheet" href="./css/style.css">


    <title>Shop</title>
</head>
<body>
    <div id="main">
        <h1>online shop</h1>

        <button class="cart" id="buy">
            <img class="cart__image" src="img/basket3.png" alt="Cart" />
            <div class="cart__num" id="cart_num">0</div>
          </button>
      </div>

    <div class="popup" id="popup">
        <div class="popup__container" id="popup_container">
          <div class="popup__item">
            <h1 class="popup__title">Оформление заказа</h1>
          </div>
          <div class="popup__item" id="popup_product_list">
            <div class="popup__product">
              <div class="popup__product-wrap">
                <img
                  src="./img/tovasr-dnya.png"
                  alt="Сердце байкала"
                  class="popup__product-image"
                />
                <h2 class="popup__product-title">
                  Сердце байкала
                </h2>
              </div>
              <div class="popup__product-wrap">
                <div class="popup__product-price">1 039</div>
                <button class="popup__product-delete"></button>
              </div>
            </div>
          </div>
          <div class="popup__item">
            <div class="popup__cost">
              <h2 class="popup__cost-title">Итого</h2>
              <output class="popup__cost-value" id="popup_cost">1 139</output>
            </div>
            <div class="popup__cost">
              <h2 class="popup__cost-title">Скидка</h2>
              <output class="popup__cost-value" id="popup_discount">100</output>
            </div>
            <div class="popup__cost">
              <h2 class="popup__cost-title">Итого со скидкой</h2>
              <output class="popup__cost-value" id="popup_cost_discount"
                >1 039</output
              >
            </div>
            
          </div>
          <form id="reg">
            <input type="text" placeholder="Имя" id="user_name">
            <input type="text" placeholder="Email" id="user_email">
            <input type="text" placeholder="Телефон" id="user_phone">
            <button id="get_reg">Оформить</button>
          </form>
          <button class="popup__close" id="popup_close">close</button>
        </div>
      </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="./js/script.js"></script>

</body>

</html>
